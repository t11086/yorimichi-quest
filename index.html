<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>よりみちクエスト</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "BIZ UDGothic", "Yu Gothic", sans-serif;
    background: #f7f1e3;
    color: #4a3f35;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #app { width: 100%; max-width: 480px; padding: 16px 16px 96px; }

  header { text-align: center; padding: 8px 0 4px; }
  header h1 { font-size: 22px; letter-spacing: 2px; }

  .stage { position: relative; height: min(62vh, 500px); margin-top: 20px; }
  .hint { text-align: center; font-size: 11px; color: #b3a184; letter-spacing: 1px; margin-top: 52px; }

  /* 完了スタンプ（チェーン完成時だけ出る軽い演出） */
  .toast {
    position: absolute; left: 50%; top: 34%;
    font-size: 20px; font-weight: bold; color: #e8703a;
    border: 3px solid #e8703a; border-radius: 10px; background: #fffdf7;
    padding: 6px 18px; letter-spacing: 2px; white-space: nowrap;
    z-index: 6; pointer-events: none;
    animation: toastpop 1.5s ease forwards;
  }
  @keyframes toastpop {
    0%   { opacity: 0; transform: translate(-50%, -50%) rotate(-6deg) scale(.5); }
    15%  { opacity: 1; transform: translate(-50%, -50%) rotate(-6deg) scale(1.08); }
    25%  { transform: translate(-50%, -50%) rotate(-6deg) scale(1); }
    75%  { opacity: 1; transform: translate(-50%, -50%) rotate(-6deg) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -60%) rotate(-6deg) scale(1); }
  }

  .card {
    position: absolute; inset: 0;
    background: #fffdf7;
    border: 1.5px solid #e3d7bd;
    border-radius: 20px;
    padding: 24px 20px 20px;
    box-shadow: 0 4px 0 #e3d7bd;
    display: flex; flex-direction: column;
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
  }
  .card.back { pointer-events: none; background: #fbf6e9; }
  .card.b1 { transform: translate(-14px, 16px) rotate(-4deg); }
  .card.b2 { transform: translate(16px, 32px) rotate(3.5deg); }

  .qtext {
    flex: 1; display: flex; align-items: center; justify-content: center;
    text-align: center; font-size: 24px; line-height: 1.8; font-weight: bold; margin: 0 4px;
  }

  .actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-skip, .btn-done {
    border: none; border-radius: 12px; font-family: inherit; font-size: 14px;
    padding: 15px 0; cursor: pointer; font-weight: bold;
  }
  .btn-skip {
    background: #f3ecdc; color: #8a7a64; box-shadow: 0 2px 0 #ddcfb4;
  }
  .btn-done {
    background: #e8703a; color: #fff; box-shadow: 0 2px 0 #c05a2b; letter-spacing: 2px; font-size: 16px;
  }
  .btn-have {
    border: 1.5px dashed #d5c6a8; border-radius: 12px; font-family: inherit; font-size: 13px;
    padding: 12px 0; cursor: pointer; font-weight: bold;
    background: none; color: #8a7a64;
  }
  .btn-skip:active, .btn-done:active { transform: translateY(2px); box-shadow: none; }

  /* emoji burst */
  .burst { position: absolute; left: 50%; top: 38%; pointer-events: none; z-index: 5; }
  .burst span {
    position: absolute; font-size: 22px; animation: pop .8s ease-out forwards;
  }
  @keyframes pop {
    0% { transform: translate(0,0) scale(.4); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(1.2); opacity: 0; }
  }

  /* album */
  .album-head { text-align: center; margin: 16px 0 4px; font-size: 14px; color: #8a7a64; }
  .album-head b { font-size: 22px; color: #4a3f35; }
  .datelabel { font-size: 12px; color: #b3a184; margin: 18px 4px 6px; letter-spacing: 1px; }
  .entry {
    background: #fffdf7; border: 1.5px solid #e3d7bd; border-radius: 14px;
    padding: 12px 14px; margin-bottom: 10px;
    position: relative;
  }
  .entry .etext { font-size: 14px; line-height: 1.5; padding-right: 52px; }
  .btn-undo {
    position: absolute; top: 10px; right: 10px;
    border: 1px solid #ddcfb4; border-radius: 8px; background: #f3ecdc;
    font-family: inherit; font-size: 11px; color: #8a7a64; font-weight: bold;
    padding: 4px 8px; cursor: pointer;
  }
  .entry img { width: 100%; border-radius: 10px; margin-top: 10px; display: block; }
  .empty { text-align: center; color: #b3a184; font-size: 13px; margin-top: 48px; line-height: 2; }

  /* tabs */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: center; gap: 0;
    background: #fffdf7; border-top: 1.5px solid #e3d7bd;
    padding: 6px 0 calc(8px + env(safe-area-inset-bottom));
  }
  nav button {
    flex: 1; max-width: 240px; background: none; border: none; font-family: inherit;
    font-size: 13px; color: #b3a184; padding: 8px 0; cursor: pointer; font-weight: bold;
  }
  nav button.active { color: #e8703a; }
  nav button .ico { display: block; font-size: 20px; }

  /* modal */
  #modal, #reveal, #fortune {
    position: fixed; inset: 0; background: rgba(74,63,53,.45);
    display: flex; align-items: center; justify-content: center; z-index: 10; padding: 24px;
  }
  #modal[hidden], #reveal[hidden], #fortune[hidden] { display: none; }
  .tanka { font-size: 17px; line-height: 2.1; text-align: center; font-weight: bold; margin: 10px 0 14px; }
  .tanka p { margin: 0; }
  .mbox {
    background: #fffdf7; border-radius: 20px; padding: 24px 20px; width: 100%; max-width: 360px;
    text-align: center; animation: rise .25s ease;
  }
  @keyframes rise { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
  .mbox .stamp {
    display: inline-block; font-size: 18px; font-weight: bold; color: #e8703a;
    border: 3px solid #e8703a; border-radius: 10px; padding: 4px 14px;
    transform: rotate(-6deg); margin-bottom: 12px; letter-spacing: 2px;
  }
  .mbox .mq { font-size: 14px; color: #8a7a64; line-height: 1.6; margin-bottom: 18px; }
  .mnote {
    width: 100%; border: 1.5px solid #ddcfb4; border-radius: 10px;
    padding: 11px 12px; font-family: inherit; font-size: 15px;
    background: #fff; color: inherit; margin-bottom: 4px;
  }
  .mnote::placeholder { color: #c9baa0; }
  .enote { font-size: 13px; color: #8a7a64; margin-top: 6px; }
  .mbox button {
    display: block; width: 100%; border: none; border-radius: 12px; font-family: inherit;
    font-size: 15px; font-weight: bold; padding: 13px 0; cursor: pointer; margin-top: 10px;
  }
  .m-plain { background: #e8703a; color: #fff; box-shadow: 0 2px 0 #c05a2b; letter-spacing: 2px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>よりみちクエスト</h1>
  </header>

  <section id="view-today">
    <div class="stage" id="stage">
      <div class="card back b2"></div>
      <div class="card back b1"></div>
      <div class="card" id="card"></div>
    </div>
    <p class="hint">← よこに スワイプしても べつのクエスト →</p>
  </section>

  <section id="view-album" hidden>
    <div class="album-head">つうさん <b id="totalcount">0</b> クエスト</div>
    <div id="albumlist"></div>
  </section>

  <nav>
    <button id="tab-today" class="active"><span class="ico">📜</span>きょうのクエスト</button>
    <button id="tab-album"><span class="ico">📖</span>おもいでアルバム</button>
  </nav>
</div>

<input type="file" id="camerain" accept="image/*" capture="environment" hidden>

<div id="modal" hidden>
  <div class="mbox">
    <div class="stamp" id="modal-stamp">クエストクリア！</div>
    <p class="mq" id="modal-q"></p>
    <input type="text" class="mnote" id="modal-note" hidden>
    <button class="m-plain" id="m-plain">これで完了</button>
  </div>
</div>
<div id="fortune" hidden>
  <div class="mbox">
    <div class="stamp">手相占い</div>
    <p class="mq" id="fortune-text"></p>
    <button class="m-plain" id="f-close">とじる</button>
  </div>
</div>
<div id="reveal" hidden>
  <div class="mbox">
    <div class="stamp">短歌、完成。</div>
    <div class="tanka" id="tanka-lines"></div>
    <p class="mq">いつかの5文字と7文字が、歌になりました。</p>
    <button class="m-plain" id="r-close">とじる</button>
  </div>
</div>

<script>
// ---- クエストプール（文体ガイド: CLAUDE.md 参照） ----
// place: 'いえ' | 'そと' | 'どこでも'
const CATS = {
  hirou:    { name: 'ひろう',    emoji: '🪨', color: '#7a9e7e' },
  tsukuru:  { name: 'つくる',    emoji: '✂️', color: '#d98e5f' },
  totonoe:  { name: 'ととのえる', emoji: '🧺', color: '#8ba3c7' },
  kaku:     { name: 'かく',      emoji: '🖍️', color: '#c77f9e' },
  miru:     { name: 'みる・きく', emoji: '👀', color: '#a08cc0' },
  tanken:   { name: 'たんけん',  emoji: '🧭', color: '#5f9ea0' },
  yattemiru:{ name: 'やってみる', emoji: '🎲', color: '#c7a24b' },
};
const QUESTS = [
  { id: 1,  cat: 'hirou',    place: 'そと',    text: 'すべすべの石をひとつ拾う' },
  { id: 2,  cat: 'hirou',    place: 'そと',    text: 'きれいな落ち葉を1枚拾う' },
  { id: 3,  cat: 'hirou',    place: 'そと',    text: '落ちているゴミをひとつ拾って、捨てる' },
  { id: 6,  cat: 'tsukuru',  place: 'いえ',    text: '紙飛行機を折る' },
  { id: 7,  cat: 'tsukuru',  place: 'いえ',    text: 'ハサミでアルミホイルを切る' },
  { id: 9,  cat: 'totonoe',  place: 'いえ',    text: 'いらないものをひとつ捨てる' },
  { id: 10, cat: 'totonoe',  place: 'どこでも', text: '財布からいらないレシートを出す' },
  { id: 11, cat: 'totonoe',  place: 'どこでも', text: 'スマホの写真を、いらないもの1枚だけ消す' },
  { id: 12, cat: 'totonoe',  place: 'いえ',    text: '机の上のものをひとつ、家の中の正しい場所に帰す' },
  { id: 13, cat: 'totonoe',  place: 'いえ',    text: '手持ちのペン5本を書けるか試す' },
  { id: 14, cat: 'kaku',     place: 'どこでも', text: '左を向いた猫の絵を描く' },
  { id: 15, cat: 'kaku',     place: 'どこでも', text: '自分の名前の1文字目をできるだけ丁寧に書く' },
  { id: 16, cat: 'kaku',     place: 'どこでも', text: '首をかしげた猫の絵を描く' },
  { id: 21, cat: 'miru',     place: 'どこでも', text: '左手の感情線は、中指と人差し指の間までのびていますか？',
    choices: [
      { label: 'のびてる',   result: 'あなたは愛情深く、いちど好きになったものをずっと大切にする人です。' },
      { label: 'のびてない', result: 'あなたはクールに見えて、心の奥に熱いものをかくしている人です。' },
    ] },
  { id: 22, cat: 'miru',     place: 'どこでも', text: '右手のまんなかに、手首から中指へのびる縦線はありますか？',
    choices: [
      { label: 'ある', result: 'あなたは自分の道をゆく人です。まわりの声は、いいBGMになります。' },
      { label: 'ない', result: 'あなたは風まかせで生きられる人です。それがいちばん遠くまで行けます。' },
    ] },
  { id: 23, cat: 'miru',     place: 'どこでも', text: '左手の頭脳線（まんなかの線）は、まっすぐ？下にカーブ？',
    choices: [
      { label: 'まっすぐ', result: 'あなたは現実派です。買い物で失敗しないタイプです。' },
      { label: 'カーブ',   result: 'あなたは夢見る人です。ときどき、ここではない場所を見ています。' },
    ] },
  { id: 24, cat: 'miru',     place: 'どこでも', text: '両手の指を組んでみてください。上にくる親指はどっち？',
    choices: [
      { label: 'ひだり', result: 'あなたは直感の人です。最初のひらめきが、だいたい正解です。' },
      { label: 'みぎ',   result: 'あなたは理屈の人です。説明書をちゃんと読む、えらい側の人です。' },
    ] },
  { id: 25, cat: 'miru',     place: 'どこでも', text: '右手の小指は、薬指の第一関節より長いですか？',
    choices: [
      { label: 'ながい',   result: 'あなたは話す才能の持ち主です。今日のひとことが、誰かに残ります。' },
      { label: 'みじかい', result: 'あなたは聞き上手です。みんな、ほんとうはあなたに話したいのです。' },
    ] },
  { id: 26, cat: 'tanken',   place: 'そと',    text: '今日履いている靴の写真を撮る', camera: true },
  { id: 27, cat: 'yattemiru', place: 'いえ',    text: '温かいお茶を淹れる' },
  { id: 30, cat: 'yattemiru', place: 'いえ',    text: '床に寝転んで大の字で目をつぶる' },
  { id: 32, cat: 'yattemiru', place: 'いえ',    text: '本を1冊選ぶ', input: '本のタイトル' },
  { id: 34, cat: 'yattemiru', place: 'どこでも', text: 'かばんのポケットの中身を出す' },
  { id: 35, cat: 'yattemiru', place: 'どこでも', text: '立ち上がってかかと上げを10回する' },
  { id: 36, cat: 'yattemiru', place: 'いえ',    text: '口の中で舌回しをする' },
];

// ---- チェーンクエスト（つづきもの） ----
// 複数のクエストを順にこなすと何かが完成する。現在のステップだけがデッキに混ざる。
// 見た目は普通のクエスト（チップなし）。完成して初めて意図に気づく。
// have: true → 買い物系。「もう家にある」ボタンが出る（押すと完了扱い）
const CHAINS = [
  { id: 'shoyu', steps: [
    { text: '八角を買ってくる', have: true },
    { text: 'シナモンを買ってくる', have: true },
    { text: '花椒を買ってくる', have: true },
    { text: '八角とシナモンと花椒を瓶に入れて、醤油で漬ける' },
    { text: '前につけた台湾風醤油を料理にかけてみる' },
  ]},
  { id: 'coaster', steps: [
    { text: 'ダンボールを丸く切る' },
    { text: '白いポスカを買ってくる', have: true },
    { text: '丸く切ったダンボールに、白いポスカで模様を描く' },
    { text: '模様を描いたダンボールをコースターにして、飲み物を飲む' },
  ]},
  // 5・7・5・7・7 — 完成して初めて短歌だったと気づく
  { id: 'tanka', steps: [
    { text: '好きな5文字を考える', input: '好きな5文字' },
    { text: '好きな7文字を考える', input: '好きな7文字' },
    { text: '好きな5文字を考える', input: '好きな5文字' },
    { text: '好きな7文字を考える', input: '好きな7文字' },
    { text: '好きな7文字を考える', input: '好きな7文字' },
  ]},
];
const CHAIN_STEPS = {};
CHAINS.forEach(ch => ch.steps.forEach((st, i) => {
  CHAIN_STEPS[`${ch.id}-${i}`] = {
    id: `${ch.id}-${i}`, text: st.text, have: !!st.have, input: st.input, cat: null,
    chainId: ch.id, stepIndex: i, isLast: i === ch.steps.length - 1,
  };
}));

// ---- 状態 ----
const KEY = 'yorimichi_v1';
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

function hashSeed(str) {
  let h = 1779033703;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return h >>> 0;
}
function mulberry32(a) {
  return function() {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function dailyOrder(day, chains) {
  const rand = mulberry32(hashSeed(day));
  const ids = QUESTS.map(q => q.id);
  CHAINS.forEach(ch => {
    const step = (chains && chains[ch.id]) || 0;
    if (step < ch.steps.length) ids.push(`${ch.id}-${step}`);
  });
  for (let i = ids.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [ids[i], ids[j]] = [ids[j], ids[i]];
  }
  return ids;
}

let S = load();
function load() {
  let s = null;
  try { s = JSON.parse(localStorage.getItem(KEY)); } catch (e) {}
  if (!s) s = { day: '', order: [], slot: null, skipped: [], doneToday: [], chains: {}, log: [] };
  if (!s.chains) s.chains = {};
  if (Array.isArray(s.slots)) { s.slot = s.slots[0] ?? null; delete s.slots; }  // 旧3枠形式からの移行
  s.order = (s.order || []).filter(id => byId(id));  // 廃止クエストを掃除
  if (s.day !== todayStr()) {
    s.day = todayStr();
    s.order = dailyOrder(s.day, s.chains);
    s.skipped = [];
    s.doneToday = [];
    s.slot = null;
    s.slot = draw(s);
  } else {
    // 同日中のアップデート対応: 新しく追加されたクエストをデッキに紛れ込ませる
    QUESTS.forEach(q => {
      if (!s.order.includes(q.id)) {
        s.order.splice(Math.floor(Math.random() * (s.order.length + 1)), 0, q.id);
      }
    });
    // 同日中のアップデート対応: 進行中チェーンの現在ステップがデッキに無ければ紛れ込ませる
    CHAINS.forEach(ch => {
      const step = s.chains[ch.id] || 0;
      const stepId = `${ch.id}-${step}`;
      if (step < ch.steps.length && !s.order.includes(stepId)) {
        s.order.splice(Math.floor(Math.random() * (s.order.length + 1)), 0, stepId);
      }
    });
    if (!byId(s.slot)) { s.slot = null; s.slot = draw(s); }
  }
  return s;
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); }
  catch (e) { alert('保存にしっぱいしました（容量オーバーかも）'); }
}
function byId(id) { return CHAIN_STEPS[id] || QUESTS.find(q => q.id === id); }

// デッキから次の1枚を引く。除外が厳しくて引けなければ段階的にゆるめる
function draw(s) {
  const isCurrent = id => id === s.slot;
  const tiers = [
    id => !isCurrent(id) && !s.skipped.includes(id) && !s.doneToday.includes(id),
    id => !isCurrent(id) && !s.doneToday.includes(id),  // スキップ札を再利用
    id => !isCurrent(id),                               // 完了済みも再利用
  ];
  for (const ok of tiers) {
    const found = s.order.find(ok);
    if (found !== undefined) return found;
  }
  return s.order.find(id => !isCurrent(id)) ?? s.order[0];
}

// ---- 描画 ----
const $ = sel => document.querySelector(sel);
const cardEl = $('#card');
const stageEl = $('#stage');

function cardHTML(q) {
  const haveBtn = q.have ? '<button class="btn-have">🏠 もう家にある</button>' : '';
  const mainBtns = q.choices
    ? q.choices.map((c, i) => `<button class="btn-done" data-choice="${i}">${c.label}</button>`).join('')
    : q.camera
    ? '<button class="btn-done btn-camera">📷 しゃしんを撮る</button>'
    : '<button class="btn-done">やった</button>';
  return `
    <p class="qtext">${q.text}</p>
    <div class="actions">
      ${mainBtns}
      ${haveBtn}
      <button class="btn-skip">🔄 べつのにする</button>
    </div>`;
}

function renderCard() {
  cardEl.innerHTML = cardHTML(byId(S.slot));
}

// カード差し替え: 前のカードが飛んでいき、次のカードが山から繰り上がる
let animating = false;
function swapCard(outX, outY, rot) {
  animating = true;
  cardEl.style.transition = 'transform .22s ease-in, opacity .22s';
  cardEl.style.transform = `translate(${outX}px, ${outY}px) rotate(${rot}deg)`;
  cardEl.style.opacity = '0';
  setTimeout(() => {
    renderCard();
    cardEl.style.transition = 'none';
    cardEl.style.transform = 'translate(-14px, 16px) rotate(-4deg)';  // 山の1枚目の位置から
    requestAnimationFrame(() => requestAnimationFrame(() => {
      cardEl.style.transition = 'transform .2s ease-out, opacity .15s';
      cardEl.style.transform = '';
      cardEl.style.opacity = '1';
      setTimeout(() => { animating = false; }, 220);
    }));
  }, 230);
}

function reroll(dir) {
  if (animating) return;
  S.skipped.push(S.slot);              // 同日中は再登場しない
  S.slot = draw(S);
  save();
  swapCard(dir * window.innerWidth, 60, dir * 14);
}

function burst() {
  const b = document.createElement('div');
  b.className = 'burst';
  const emojis = ['🎉', '✨', '⭐', '🎊', '✨', '🌟'];
  emojis.forEach((e, i) => {
    const sp = document.createElement('span');
    sp.textContent = e;
    const ang = (i / emojis.length) * Math.PI * 2;
    sp.style.setProperty('--dx', `${Math.cos(ang) * 70}px`);
    sp.style.setProperty('--dy', `${Math.sin(ang) * 55 - 30}px`);
    b.appendChild(sp);
  });
  stageEl.appendChild(b);   // カードが飛んでいっても消えないようにステージに乗せる
  setTimeout(() => b.remove(), 900);
}

// ---- 操作 ----
cardEl.addEventListener('click', e => {
  if (animating) return;
  if (e.target.closest('.btn-skip')) {
    reroll(-1);
  } else if (e.target.closest('.btn-have')) {
    completeQuest();                     // 買わずに完了
  } else if (e.target.closest('.btn-done')) {
    const q = byId(S.slot);
    if (q.choices) {
      // 二択クエスト: 先に結果（占い）を見せて、とじたら完了してカードが飛ぶ
      const c = q.choices[Number(e.target.closest('.btn-done').dataset.choice)];
      showFortune(c.result);
    } else if (q.camera) {
      $('#camerain').click();            // カメラ起動。撮れたら完了
    } else if (q.input) {
      openModal();                       // 入力があるクエストだけダイアログ
    } else {
      completeQuest();
    }
  }
});

// カメラクエスト: 撮影した写真を縮小してアルバムに残し、そのまま完了
$('#camerain').addEventListener('change', e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    const max = 640;
    const scale = Math.min(1, max / Math.max(img.width, img.height));
    const cv = document.createElement('canvas');
    cv.width = Math.round(img.width * scale);
    cv.height = Math.round(img.height * scale);
    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
    URL.revokeObjectURL(img.src);
    completeQuest(null, cv.toDataURL('image/jpeg', 0.72));
  };
  img.src = URL.createObjectURL(file);
});

let pendingFortune = null;
function showFortune(text) {
  pendingFortune = text;
  $('#fortune-text').textContent = text;
  $('#fortune').hidden = false;
}
$('#f-close').addEventListener('click', () => {
  $('#fortune').hidden = true;
  if (pendingFortune !== null) {
    const r = pendingFortune;
    pendingFortune = null;
    completeQuest(r);                    // とじてから完了 → カードが飛んでいく
  }
});

// スワイプでリロール
let dragStartX = null, dragX = 0;
cardEl.addEventListener('pointerdown', e => {
  if (animating || e.target.closest('button')) return;
  dragStartX = e.clientX;
  dragX = 0;
  cardEl.setPointerCapture(e.pointerId);
  cardEl.style.transition = 'none';
});
cardEl.addEventListener('pointermove', e => {
  if (dragStartX === null) return;
  dragX = e.clientX - dragStartX;
  cardEl.style.transform = `translateX(${dragX}px) rotate(${dragX / 30}deg)`;
});
function dragEnd() {
  if (dragStartX === null) return;
  dragStartX = null;
  if (Math.abs(dragX) > 70) {
    reroll(Math.sign(dragX));
  } else {
    cardEl.style.transition = 'transform .18s ease-out';
    cardEl.style.transform = '';
  }
  dragX = 0;
}
cardEl.addEventListener('pointerup', dragEnd);
cardEl.addEventListener('pointercancel', dragEnd);

// 完了モーダル
let pending = false;
function openModal() {
  pending = true;
  const q = byId(S.slot);
  $('#modal-stamp').textContent = q.isLast ? 'なにかが完成した！' : 'クエストクリア！';
  $('#modal-q').textContent = q.text;
  const note = $('#modal-note');
  note.hidden = !q.input;
  note.placeholder = q.input || '';
  note.value = '';
  $('#modal').hidden = false;
}
function completeQuest(forcedNote, photo) {
  pending = false;
  $('#modal').hidden = true;
  const id = S.slot;
  const entry = { id, ts: Date.now() };
  const noteEl = $('#modal-note');
  const noteText = forcedNote || (noteEl.hidden ? '' : noteEl.value.trim());
  if (noteText) entry.note = noteText;
  if (photo) entry.photo = photo;
  noteEl.value = '';
  noteEl.hidden = true;
  S.log.push(entry);
  S.doneToday.push(id);
  const cq = byId(id);
  if (cq.chainId) {
    // チェーンを1歩進め、次のステップをデッキのランダムな位置に紛れ込ませる
    if ((S.chains[cq.chainId] || 0) === cq.stepIndex) {
      S.chains[cq.chainId] = cq.stepIndex + 1;
      if (!cq.isLast) {
        const nextId = `${cq.chainId}-${cq.stepIndex + 1}`;
        S.order.splice(Math.floor(Math.random() * (S.order.length + 1)), 0, nextId);
      }
    }
    S.order = S.order.filter(x => x !== id);
    if (cq.chainId === 'tanka' && cq.isLast) {
      // これまでの「好きな文字」を5-7-5-7-7に並べて一首にする
      const lines = CHAINS.find(c => c.id === 'tanka').steps.map((_, i) => {
        const e = [...S.log].reverse().find(en => en.id === 'tanka-' + i && en.note);
        return e ? e.note : '（　）';
      });
      entry.tanka = lines;               // アルバムにも歌として残す
      setTimeout(() => showTanka(lines), 700);
    } else if (cq.isLast) {
      setTimeout(() => showToast('なにかが完成した！'), 500);
    }
  }
  S.slot = draw(S);
  save();
  burst();
  swapCard(0, -window.innerHeight * 0.6, -6);   // 完了は上に飛んでいく
  updateBadge();
}

function showToast(text) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = text;
  stageEl.appendChild(t);
  setTimeout(() => t.remove(), 1600);
}
function showTanka(lines) {
  const box = $('#tanka-lines');
  box.innerHTML = '';
  lines.forEach(t => {
    const p = document.createElement('p');
    p.textContent = t;
    box.appendChild(p);
  });
  $('#reveal').hidden = false;
}
$('#r-close').addEventListener('click', () => { $('#reveal').hidden = true; });

$('#m-plain').addEventListener('click', () => completeQuest());
$('#modal').addEventListener('click', e => {
  if (e.target.id === 'modal') { $('#modal').hidden = true; pending = false; }
});

// ---- アルバム ----
function renderAlbum() {
  $('#totalcount').textContent = S.log.length;
  const list = $('#albumlist');
  list.innerHTML = '';
  if (S.log.length === 0) {
    list.innerHTML = '<p class="empty">まだ なにもありません。<br>むいみな ようじを すませると<br>ここに たまっていきます。</p>';
    return;
  }
  let lastDate = '';
  [...S.log].reverse().forEach((entry, ri) => {
    const logIndex = S.log.length - 1 - ri;
    const q = byId(entry.id);
    if (!q) return;                      // 廃止クエストのログはスキップ
    const d = new Date(entry.ts);
    const dstr = `${d.getMonth()+1}月${d.getDate()}日`;
    if (dstr !== lastDate) {
      lastDate = dstr;
      const lb = document.createElement('div');
      lb.className = 'datelabel';
      lb.textContent = `── ${dstr} ──`;
      list.appendChild(lb);
    }
    const emoji = q.cat ? CATS[q.cat].emoji : '✨';
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `<p class="etext">${emoji} ${q.text}</p><button class="btn-undo" data-index="${logIndex}">戻す</button>`;
    if (entry.tanka) {
      const tp = document.createElement('div');
      tp.className = 'tanka';
      entry.tanka.forEach(t => {
        const p = document.createElement('p');
        p.textContent = t;
        tp.appendChild(p);
      });
      div.appendChild(tp);
    } else if (entry.note) {
      const np = document.createElement('p');
      np.className = 'enote';
      np.textContent = `「${entry.note}」`;
      div.appendChild(np);
    }
    if (entry.photo) {
      const img = document.createElement('img');
      img.src = entry.photo;
      img.loading = 'lazy';
      div.appendChild(img);
    }
    list.appendChild(div);
  });
}

// 完了を取り消す（デバッグ用）: ログから消し、同日ならデッキにも戻す
function undoEntry(logIndex) {
  const entry = S.log[logIndex];
  if (!entry) return;
  const q = byId(entry.id);
  S.log.splice(logIndex, 1);
  const di = S.doneToday.indexOf(entry.id);
  if (di !== -1) S.doneToday.splice(di, 1);
  if (q && q.chainId) {
    // 最新ステップの取り消しならチェーンを1歩巻き戻す
    if ((S.chains[q.chainId] || 0) === q.stepIndex + 1) {
      S.chains[q.chainId] = q.stepIndex;
      const nextId = `${q.chainId}-${q.stepIndex + 1}`;
      S.order = S.order.filter(x => x !== nextId);
      if (!S.order.includes(entry.id)) {
        S.order.splice(Math.floor(Math.random() * (S.order.length + 1)), 0, entry.id);
      }
      // 巻き戻しで消したステップが場に出ていたら引き直す
      if (S.slot === nextId) { S.slot = draw(S); renderCard(); }
    }
  }
  save();
  renderAlbum();
  updateBadge();
}
document.querySelector('#albumlist').addEventListener('click', e => {
  const btn = e.target.closest('.btn-undo');
  if (btn) undoEntry(Number(btn.dataset.index));
});

// ---- タブ ----
function showTab(name) {
  $('#view-today').hidden = name !== 'today';
  $('#view-album').hidden = name !== 'album';
  $('#tab-today').classList.toggle('active', name === 'today');
  $('#tab-album').classList.toggle('active', name === 'album');
  if (name === 'album') renderAlbum();
}
$('#tab-today').addEventListener('click', () => showTab('today'));
$('#tab-album').addEventListener('click', () => showTab('album'));
function updateBadge() {
  $('#tab-album').innerHTML = `<span class="ico">📖</span>おもいでアルバム（${S.log.length}）`;
}

// ---- 起動 ----
save();
renderCard();
updateBadge();
</script>
