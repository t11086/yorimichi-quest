<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Whim</title>

<!-- フォントのみ外部依存の例外（CLAUDE.md 技術方針参照）。オフライン時はシステムの手書き系に落ちる -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Zen+Kurenaido&display=swap" rel="stylesheet">
<style>
  /* 韓国の감성手帳アプリ風: 白い方眼紙・手書き文字・マスキングテープ・モノクロ+差し色1色 */
  :root {
    --paper: #fffefa;
    --bg: #f4f3ee;
    --ink: #33312c;
    --sub: #9b978e;
    --line: #dcd9cf;
    --accent: #5c74a8;           /* くすみブルー */
    --bad: #cf5f4a;
    --hand: "Caveat", "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;   /* 英語の手書き */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    /* 日本語の手書き感: Zen Kurenaido(Google Fonts)。オフライン時はクレー(Mac)→教科書体(Win)→丸ゴ(iOS) */
    font-family: "Zen Kurenaido", "Klee", "YuKyokasho", "Yu Kyokasho", "UD デジタル 教科書体 N-R", "Hiragino Maru Gothic ProN", sans-serif;
    background: var(--bg);
    background-image: radial-gradient(#dedbd1 1px, transparent 1.2px);   /* ドット方眼 */
    background-size: 22px 22px;
    color: var(--ink);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #app { width: 100%; max-width: 480px; padding: 16px 16px 96px; }

  header { text-align: center; padding: 10px 0 0; }
  header h1 { transform: rotate(-2deg); }
  header h1 svg { height: 30px; width: auto; display: block; margin: 0 auto; color: var(--ink); }
  header .tagline { font-size: 10px; color: var(--sub); letter-spacing: 3px; margin-top: 3px; }

  .stage { position: relative; height: min(62vh, 500px); margin-top: 26px; }
  .hint { text-align: center; font-size: 11px; color: var(--sub); letter-spacing: 2px; margin-top: 48px; }

  .card {
    position: absolute; inset: 0;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 32px 20px 20px;
    box-shadow: 0 3px 14px rgba(51,49,44,.08);
    display: flex; flex-direction: column;
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
  }
  /* マスキングテープ */
  .card::before {
    content: ""; position: absolute; top: -9px; left: 50%; width: 78px; height: 22px;
    transform: translateX(-50%) rotate(-3deg);
    background: rgba(244, 226, 138, .85);
    box-shadow: 0 1px 2px rgba(51,49,44,.08);
  }
  .card.back { pointer-events: none; background: #fbfaf4; }
  .card.b1 { transform: translate(-14px, 16px) rotate(-4deg); }
  .card.b1::before { background: rgba(186, 203, 232, .85); transform: translateX(-50%) rotate(2deg); }
  .card.b2 { transform: translate(16px, 32px) rotate(3.5deg); }
  .card.b2::before { background: rgba(240, 203, 213, .85); }

  .qtext {
    flex: 1; display: flex; align-items: center; justify-content: center;
    text-align: center; font-size: 23px; line-height: 1.9; font-weight: 600; margin: 0 4px;
  }
  .qtext.small { font-size: 19px; }

  /* スパイス申告の選択チップ */
  .chips {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin-bottom: 14px; overflow-y: auto;
  }
  .chip {
    border: 1px solid var(--line); border-radius: 6px; background: var(--paper);
    font-family: inherit; font-size: 13px; font-weight: 600; color: #77746b;
    padding: 8px 12px; cursor: pointer;
  }
  .chip.on { background: var(--ink); border-color: var(--ink); color: var(--paper); }

  .actions { display: flex; flex-direction: column; gap: 12px; }
  .btn-done {
    border: none; border-radius: 8px; font-family: inherit;
    background: var(--ink); color: var(--paper);
    font-size: 15px; font-weight: 600; letter-spacing: 6px; text-indent: 6px;
    padding: 14px 0; cursor: pointer;
  }
  .btn-done:active { transform: translateY(1px); opacity: .85; }
  .btn-skip {
    border: none; background: none; font-family: inherit;
    font-size: 13px; color: var(--sub); padding: 4px 0; cursor: pointer;
    text-decoration: underline wavy #c9c5ba; text-underline-offset: 5px;
  }
  .btn-have {
    border: 1px dashed #c3bfb4; border-radius: 8px; font-family: inherit; font-size: 13px;
    padding: 12px 0; cursor: pointer; font-weight: 600;
    background: none; color: #77746b;
  }

  /* 完了のキラキラ（手描き記号） */
  .burst { position: absolute; left: 50%; top: 38%; pointer-events: none; z-index: 5; }
  .burst span {
    position: absolute; font-size: 18px; font-weight: bold; color: var(--accent);
    animation: pop .8s ease-out forwards;
  }
  .burst span:nth-child(even) { color: #d9a23a; font-size: 14px; }
  @keyframes pop {
    0% { transform: translate(0,0) scale(.4); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(1.2); opacity: 0; }
  }

  /* album */
  .album-head { text-align: center; margin: 18px 0 4px; font-size: 13px; color: var(--sub); letter-spacing: 1px; }
  .album-head b { font-family: var(--hand); font-size: 26px; color: var(--ink); margin: 0 3px; }
  .datelabel { font-size: 11px; color: var(--sub); letter-spacing: 2px; margin: 20px 4px 8px; }
  .datelabel::before { content: "✧ "; color: var(--accent); }
  .entry {
    background: var(--paper); border: 1px solid #e2dfd5; border-radius: 4px;
    padding: 12px 14px; margin-bottom: 8px;
    position: relative;
    box-shadow: 0 1px 4px rgba(51,49,44,.04);
  }
  .entry .etext { font-size: 14px; line-height: 1.6; padding-right: 44px; }
  .entry .etext::before { content: "✓ "; color: var(--accent); font-weight: bold; }
  .btn-undo {
    position: absolute; top: 10px; right: 12px;
    border: none; background: none;
    font-family: inherit; font-size: 11px; color: var(--sub);
    text-decoration: underline; text-underline-offset: 3px;
    padding: 2px; cursor: pointer;
  }
  /* 写真はポラロイド風 */
  .entry img {
    width: 88px; height: 88px; object-fit: cover;
    border: 5px solid #fff; outline: 1px solid var(--line); border-radius: 2px;
    transform: rotate(-2deg); box-shadow: 0 2px 6px rgba(51,49,44,.12);
    margin-top: 10px; display: block; cursor: pointer;
  }
  #lightbox {
    position: fixed; inset: 0; background: rgba(40,38,34,.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 20; padding: 24px; cursor: pointer;
  }
  #lightbox[hidden] { display: none; }
  #lightbox img { max-width: 100%; max-height: 100%; border: 8px solid #fff; border-radius: 2px; }
  .empty { text-align: center; color: var(--sub); font-size: 13px; margin-top: 48px; line-height: 2; }
  #resetall {
    display: block; margin: 32px auto 8px;
    border: none; background: none; font-family: inherit;
    font-size: 11px; color: var(--sub); text-decoration: underline; cursor: pointer;
  }

  /* tabs */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: center; gap: 0;
    background: rgba(255,254,250,.95); border-top: 1px solid #e2dfd5;
    -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  nav button {
    flex: 1; max-width: 240px; background: none; border: none; font-family: inherit;
    font-size: 12px; color: #b8b4a9; padding: 6px 0; cursor: pointer; font-weight: 600;
  }
  nav button.active { color: var(--ink); }
  nav button svg { display: block; width: 21px; height: 21px; margin: 0 auto 3px; }

  /* modal */
  #reveal, #fortune {
    position: fixed; inset: 0; background: rgba(40,38,34,.5);
    display: flex; align-items: center; justify-content: center; z-index: 10; padding: 24px;
  }
  #reveal[hidden], #fortune[hidden] { display: none; }
  .tanka { font-size: 17px; line-height: 2.1; text-align: center; font-weight: 600; margin: 10px 0 14px; }
  .tanka p { margin: 0; }
  .mbox {
    position: relative;
    background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
    padding: 28px 20px 22px; width: 100%; max-width: 360px;
    text-align: center; animation: rise .25s ease;
    box-shadow: 0 8px 30px rgba(40,38,34,.25);
  }
  .mbox::before {
    content: ""; position: absolute; top: -9px; left: 50%; width: 70px; height: 20px;
    transform: translateX(-50%) rotate(-2deg);
    background: rgba(244, 226, 138, .85);
    box-shadow: 0 1px 2px rgba(51,49,44,.08);
  }
  @keyframes rise { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
  .mbox .stamp {
    display: inline-block; font-size: 18px; font-weight: 600; color: var(--accent);
    border: 2.5px solid var(--accent); border-radius: 8px; padding: 4px 14px;
    transform: rotate(-5deg); margin-bottom: 12px; letter-spacing: 2px;
  }
  .mbox .mq { font-size: 14px; color: #77746b; line-height: 1.7; margin-bottom: 18px; }
  /* 入力欄は下線だけ（手帳の罫線） */
  .mnote {
    width: 100%; border: none; border-bottom: 1.5px solid #c3bfb4; border-radius: 0;
    padding: 10px 4px; font-family: inherit; font-size: 16px; text-align: center;
    background: transparent; color: inherit; margin-bottom: 4px;
  }
  .mnote:focus { outline: none; border-bottom-color: var(--ink); }
  .mnote::placeholder { color: #c3bfb4; }
  .note-ng { border-bottom-color: var(--bad) !important; animation: shake .3s; }
  .note-errmsg { font-size: 12px; color: var(--bad); text-align: center; margin: -4px 0 0; }
  @keyframes shake {
    0%, 100% { transform: none; }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .enote { font-size: 13px; color: #77746b; margin-top: 6px; }
  .mbox button {
    display: block; width: 100%; border: none; border-radius: 8px; font-family: inherit;
    font-size: 15px; font-weight: 600; padding: 13px 0; cursor: pointer; margin-top: 10px;
  }
  .m-plain { background: var(--ink); color: var(--paper); letter-spacing: 4px; text-indent: 4px; }
  .m-plain:active { transform: translateY(1px); opacity: .85; }
</style>
</head>

const SPICE_CHAINS = ['shoyu', 'dukkah', 'gokou', 'houjichai', 'tacos', 'provence'];
const CHAIN_STEPS = {};
CHAINS.forEach(ch => ch.steps.forEach((st, i) => {

    id: `${ch.id}-${i}`, text: st.text, have: !!st.have, input: st.input, finale: st.finale, cat: null,

// ---- 状態 ----
const KEY = 'yorimichi_v1';
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

function hashSeed(str) {
  let h = 1779033703;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return h >>> 0;
}
function mulberry32(a) {
  return function() {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function dailyOrder(day, chains, spices) {
  const rand = mulberry32(hashSeed(day));
  // スパイス申告は一度答えたらもう出ない
  const ids = QUESTS.filter(q => !(q.multi && spices)).map(q => q.id);
  CHAINS.forEach(ch => {
    if (SPICE_CHAINS.includes(ch.id) && !spices) return;   // 申告まで封印
    const step = (chains && chains[ch.id]) || 0;
    if (step < ch.steps.length) ids.push(`${ch.id}-${step}`);
  });
  for (let i = ids.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [ids[i], ids[j]] = [ids[j], ids[i]];
  }
  return ids;
}

let S = load();
function load() {
  let s = null;
  try { s = JSON.parse(localStorage.getItem(KEY)); } catch (e) {}
  if (!s) s = { day: '', order: [], slot: null, skipped: [], doneToday: [], chains: {}, cool: {}, spices: null, log: [] };
  if (!s.chains) s.chains = {};
  if (!s.cool) s.cool = {};
  if (s.spices === undefined) s.spices = null;       // null = まだ申告していない
  if (Array.isArray(s.slots)) { s.slot = s.slots[0] ?? null; delete s.slots; }  // 旧3枠形式からの移行
  s.order = (s.order || []).filter(id => byId(id));  // 廃止クエストを掃除
  // スパイス申告前は、スパイス系チェーンのカードをデッキから外しておく
  const gated = id => {
    const q = CHAIN_STEPS[id];
    return !s.spices && q && SPICE_CHAINS.includes(q.chainId);
  };
  s.order = s.order.filter(id => !gated(id));
  if (s.day !== todayStr()) {
    s.day = todayStr();
    s.order = dailyOrder(s.day, s.chains, s.spices);
    s.skipped = [];
    s.doneToday = [];
    s.slot = null;
    s.slot = draw(s);
  } else {
    // 同日中のアップデート対応: 新しく追加されたクエストをデッキに紛れ込ませる
    QUESTS.forEach(q => {
      if (q.multi && s.spices) return;               // 申告済みならスパイス申告は出さない
      if (!s.order.includes(q.id)) {
        s.order.splice(Math.floor(Math.random() * (s.order.length + 1)), 0, q.id);
      }
    });
    // 同日中のアップデート対応: 進行中チェーンの現在ステップがデッキに無ければ紛れ込ませる
    CHAINS.forEach(ch => {
      if (SPICE_CHAINS.includes(ch.id) && !s.spices) return;
      const step = s.chains[ch.id] || 0;
      const stepId = `${ch.id}-${step}`;
      if (step < ch.steps.length && !s.order.includes(stepId)) {
        s.order.splice(Math.floor(Math.random() * (s.order.length + 1)), 0, stepId);
      }
    });
    if (!byId(s.slot) || gated(s.slot)) { s.slot = null; s.slot = draw(s); }
  }
  // 占いカードはセッションの1枚目には出さない（デッキには残す）
  const first = byId(s.slot);
  if (first && first.choices) s.slot = draw(s);
  return s;
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); }
  catch (e) { alert('保存にしっぱいしました（容量オーバーかも）'); }
}
function byId(id) { return CHAIN_STEPS[id] || QUESTS.find(q => q.id === id); }

// デッキから次の1枚を引く。除外が厳しくて引けなければ段階的にゆるめる
function draw(s) {
  const isCurrent = id => id === s.slot;
  const isFortune = id => { const q = byId(id); return !!(q && q.choices); };
  const base = [
    id => !isCurrent(id) && !s.skipped.includes(id) && !s.doneToday.includes(id),
    id => !isCurrent(id) && !s.doneToday.includes(id),  // スキップ札を再利用
    id => !isCurrent(id),                               // 完了済みも再利用
  ];
  // 占いの次に占い、チェーンの次にチェーンが来ないように優先度をつける
  const isChainCard = id => { const q = byId(id); return !!(q && q.chainId); };
  // ステップを完了したばかりのチェーンは、間に数枚はさまるまで出さない
  const onCooldown = id => { const q = byId(id); return !!(q && q.chainId && (s.cool[q.chainId] || 0) > 0); };
  const cur = byId(s.slot);
  const avoidTypes = [];
  if (cur && cur.choices) avoidTypes.push(isFortune);
  if (cur && cur.chainId) avoidTypes.push(isChainCard);
  const noAvoid = id => !avoidTypes.some(f => f(id));
  const tiers = [];
  base.forEach(ok => {
    tiers.push(id => ok(id) && noAvoid(id) && !onCooldown(id));
    tiers.push(id => ok(id) && !onCooldown(id));
    tiers.push(ok);
  });
  for (const ok of tiers) {
    const found = s.order.find(ok);
    if (found !== undefined) return found;
  }
  return s.order.find(id => !isCurrent(id)) ?? s.order[0];
}

function renderCard() {
  cardEl.innerHTML = cardHTML(byId(S.slot));
}

// カード差し替え: 前のカードが飛んでいき、次のカードが山から繰り上がる
let animating = false;
function swapCard(outX, outY, rot) {
  animating = true;
  cardEl.style.transition = 'transform .22s ease-in, opacity .22s';
  cardEl.style.transform = `translate(${outX}px, ${outY}px) rotate(${rot}deg)`;
  cardEl.style.opacity = '0';
  setTimeout(() => {
    renderCard();
    cardEl.style.transition = 'none';
    cardEl.style.transform = 'translate(-14px, 16px) rotate(-4deg)';  // 山の1枚目の位置から
    requestAnimationFrame(() => requestAnimationFrame(() => {
      cardEl.style.transition = 'transform .2s ease-out, opacity .15s';
      cardEl.style.transform = '';
      cardEl.style.opacity = '1';
      setTimeout(() => { animating = false; }, 220);
    }));
  }, 230);
}

// 持っているスパイスの「買ってくる」ステップを読み飛ばして、チェーンの現在位置を進める
function ownedSkip(s, chainId) {
  const ch = CHAINS.find(c => c.id === chainId);
  let i = s.chains[chainId] || 0;
  while (i < ch.steps.length && ch.steps[i].item && (s.spices || []).includes(ch.steps[i].item)) i++;
  s.chains[chainId] = i;
}

// スパイス申告の完了時: 封印していたチェーンを、持ち物を反映した位置からデッキに混ぜる
function unlockSpiceChains() {
  SPICE_CHAINS.forEach(cid => {
    ownedSkip(S, cid);
    const step = S.chains[cid] || 0;
    const ch = CHAINS.find(c => c.id === cid);
    const stepId = `${cid}-${step}`;
    if (step < ch.steps.length && !S.order.includes(stepId)) {
      S.order.splice(Math.floor(Math.random() * (S.order.length + 1)), 0, stepId);
    }
  });
}

// カードを1枚消化するたびに、各チェーンのクールダウンを1減らす
function tickCool(s) {
  Object.keys(s.cool).forEach(k => { if (s.cool[k] > 0) s.cool[k]--; });
}

function reroll(dir) {
  if (animating) return;
  S.skipped.push(S.slot);              // 同日中は再登場しない
  tickCool(S);
  S.slot = draw(S);
  save();
  swapCard(dir * window.innerWidth, 60, dir * 14);
}

function burst() {
  const b = document.createElement('div');
  b.className = 'burst';
  const marks = ['✦', '✧', '＋', '✦', 'ﾟ', '✧'];
  marks.forEach((e, i) => {
    const sp = document.createElement('span');
    sp.textContent = e;
    const ang = (i / marks.length) * Math.PI * 2;
    sp.style.setProperty('--dx', `${Math.cos(ang) * 70}px`);
    sp.style.setProperty('--dy', `${Math.sin(ang) * 55 - 30}px`);
    b.appendChild(sp);
  });
  stageEl.appendChild(b);   // カードが飛んでいっても消えないようにステージに乗せる
  setTimeout(() => b.remove(), 900);
}

// ---- 操作 ----
cardEl.addEventListener('click', e => {
  if (animating) return;
  const chip = e.target.closest('.chip');
  if (chip) {
    chip.classList.toggle('on');
  } else if (e.target.closest('.btn-skip')) {
    reroll(-1);
  } else if (e.target.closest('.btn-have')) {
    completeQuest();                     // 買わずに完了
  } else if (e.target.closest('.btn-done')) {
    const q = byId(S.slot);
    if (q.choices) {
      // 二択クエスト: 先に結果（占い）を見せて、とじたら完了してカードが飛ぶ
      const c = q.choices[Number(e.target.closest('.btn-done').dataset.choice)];
      pendingComplete = { note: c.result };
      showMsg('手相占い', c.result);
    } else if (q.multi) {
      // スパイス申告: 選んだものを保存して、封印していたチェーンを解放
      const sel = [...cardEl.querySelectorAll('.chip.on')].map(b => b.textContent);
      S.spices = sel;
      unlockSpiceChains();
      completeQuest({ note: sel.length ? sel.join('、') : 'ひとつもない' });
    } else if (q.camera) {
      $('#camerain').click();            // カメラ起動。撮れたら完了
    } else if (q.chainId === 'tanka') {
      // 短歌: ちょうどの文字数で書けているかチェック
      const el = cardEl.querySelector('.card-note');
      const v = el.value.replace(/\s/g, '');
      const need = q.input.includes('5') ? 5 : 7;
      const len = [...v].length;
      if (len !== need) {
        noteError(el, len === 0 ? `${need}文字、どうぞ` : `${need}文字ちょうどで（いま${len}文字）`);
        return;
      }
      el.value = v;
      if (q.isLast) {
        // 完成した一首を先に見せて、とじたらカードが飛ぶ
        const lines = CHAINS.find(c => c.id === 'tanka').steps.map((_, i) => {
          if (i === q.stepIndex) return v;
          const en = [...S.log].reverse().find(x => x.id === 'tanka-' + i && x.note);
          return en ? en.note : '（　）';
        });
        pendingComplete = { tanka: lines };
        showTanka(lines);
        return;
      }
      completeQuest();
    } else if (q.finale) {
      // 完成メッセージ付きステップ: 先にダイアログ、とじたらカードが飛ぶ
      pendingComplete = {};
      showMsg(q.finale.stamp, q.finale.text);
    } else {
      completeQuest();                   // 入力欄があればカード上の値を拾う
    }
  }
});

// 入力欄のエラー表示（書き直しはじめたら消える）
function noteError(el, msg) {
  el.classList.remove('note-ng');
  void el.offsetWidth;                   // アニメーションを再発火させる
  el.classList.add('note-ng');
  let err = cardEl.querySelector('.note-errmsg');
  if (!err) {
    err = document.createElement('p');
    err.className = 'note-errmsg';
    el.after(err);
  }
  err.textContent = msg;
}
cardEl.addEventListener('input', e => {
  if (e.target.classList.contains('card-note')) {
    e.target.classList.remove('note-ng');
    const err = cardEl.querySelector('.note-errmsg');
    if (err) err.remove();
  }
});

// カメラクエスト: 撮影した写真を縮小してアルバムに残し、そのまま完了
$('#camerain').addEventListener('change', e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    const max = 640;
    const scale = Math.min(1, max / Math.max(img.width, img.height));
    const cv = document.createElement('canvas');
    cv.width = Math.round(img.width * scale);
    cv.height = Math.round(img.height * scale);
    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
    URL.revokeObjectURL(img.src);
    completeQuest({ photo: cv.toDataURL('image/jpeg', 0.72) });
  };
  img.src = URL.createObjectURL(file);
});

// ダイアログを見てから完了する保留分（占いの結果や短歌など）
let pendingComplete = null;
function showMsg(stamp, text) {
  $('#fortune-stamp').textContent = stamp;
  $('#fortune-text').textContent = text || '';
  $('#fortune-text').hidden = !text;
  $('#fortune').hidden = false;
}
function flushPending() {
  if (pendingComplete) {
    const p = pendingComplete;
    pendingComplete = null;
    completeQuest(p);                    // とじてから完了 → カードが飛んでいく
  }
}
$('#f-close').addEventListener('click', () => {
  $('#fortune').hidden = true;
  flushPending();
});

// スワイプでリロール
let dragStartX = null, dragX = 0;
cardEl.addEventListener('pointerdown', e => {
  if (animating || e.target.closest('button, input')) return;
  dragStartX = e.clientX;
  dragX = 0;
  cardEl.setPointerCapture(e.pointerId);
  cardEl.style.transition = 'none';
});
cardEl.addEventListener('pointermove', e => {
  if (dragStartX === null) return;
  dragX = e.clientX - dragStartX;
  cardEl.style.transform = `translateX(${dragX}px) rotate(${dragX / 30}deg)`;
});
function dragEnd() {
  if (dragStartX === null) return;
  dragStartX = null;
  if (Math.abs(dragX) > 70) {
    reroll(Math.sign(dragX));
  } else {
    cardEl.style.transition = 'transform .18s ease-out';
    cardEl.style.transform = '';
  }
  dragX = 0;
}
cardEl.addEventListener('pointerup', dragEnd);
cardEl.addEventListener('pointercancel', dragEnd);

function completeQuest(opts = {}) {
  const id = S.slot;
  const entry = { id, ts: Date.now() };
  const noteEl = cardEl.querySelector('.card-note');
  const noteText = opts.note || (noteEl ? noteEl.value.trim() : '');
  if (noteText) entry.note = noteText;
  if (opts.photo) entry.photo = opts.photo;
  if (opts.tanka) entry.tanka = opts.tanka;    // アルバムに歌として残す
  S.log.push(entry);
  S.doneToday.push(id);
  tickCool(S);
  const cq = byId(id);
  if (cq.chainId) {
    // チェーンを1歩進め（持っているスパイスの買い物は読み飛ばす）、
    // 次のステップをデッキのランダムな位置に紛れ込ませる
    if ((S.chains[cq.chainId] || 0) === cq.stepIndex) {
      S.chains[cq.chainId] = cq.stepIndex + 1;
      ownedSkip(S, cq.chainId);
      const nextStep = S.chains[cq.chainId];
      if (nextStep < CHAINS.find(c => c.id === cq.chainId).steps.length) {
        const nextId = `${cq.chainId}-${nextStep}`;
        S.order.splice(Math.floor(Math.random() * (S.order.length + 1)), 0, nextId);
        S.cool[cq.chainId] = 3;          // 次のステップは3枚はさむまで出さない
      }
    }
    S.order = S.order.filter(x => x !== id);
  }
  S.slot = draw(S);
  save();
  burst();
  swapCard(0, -window.innerHeight * 0.6, -6);   // 完了は上に飛んでいく
  updateBadge();
}

function showTanka(lines) {
  const box = $('#tanka-lines');
  box.innerHTML = '';
  lines.forEach(t => {
    const p = document.createElement('p');
    p.textContent = t;
    box.appendChild(p);
  });
  $('#reveal').hidden = false;
}
$('#r-close').addEventListener('click', () => {
  $('#reveal').hidden = true;
  flushPending();
});

// ---- アルバム ----
function renderAlbum() {
  $('#totalcount').textContent = S.log.length;
  const list = $('#albumlist');
  list.innerHTML = '';
  if (S.log.length === 0) {
    list.innerHTML = '<p class="empty">まだ なにもありません。<br>むいみな ようじを すませると<br>ここに たまっていきます。</p>';
    return;
  }
  let lastDate = '';
  [...S.log].reverse().forEach((entry, ri) => {
    const logIndex = S.log.length - 1 - ri;
    const q = byId(entry.id);
    if (!q) return;                      // 廃止クエストのログはスキップ
    const d = new Date(entry.ts);
    const dstr = `${d.getMonth()+1}月${d.getDate()}日`;
    if (dstr !== lastDate) {
      lastDate = dstr;
      const lb = document.createElement('div');
      lb.className = 'datelabel';
      lb.textContent = dstr;
      list.appendChild(lb);
    }
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `<p class="etext">${q.text}</p><button class="btn-undo" data-index="${logIndex}">戻す</button>`;
    if (entry.tanka) {
      const tp = document.createElement('div');
      tp.className = 'tanka';
      entry.tanka.forEach(t => {
        const p = document.createElement('p');
        p.textContent = t;
        tp.appendChild(p);
      });
      div.appendChild(tp);
    } else if (entry.note) {
      const np = document.createElement('p');
      np.className = 'enote';
      np.textContent = `「${entry.note}」`;
      div.appendChild(np);
    }
    if (entry.photo) {
      const img = document.createElement('img');
      img.src = entry.photo;
      img.loading = 'lazy';
      div.appendChild(img);
    }
    list.appendChild(div);
  });
}

// 完了を取り消す（デバッグ用）: ログから消し、同日ならデッキにも戻す
function undoEntry(logIndex) {
  const entry = S.log[logIndex];
  if (!entry) return;
  const q = byId(entry.id);
  S.log.splice(logIndex, 1);
  const di = S.doneToday.indexOf(entry.id);
  if (di !== -1) S.doneToday.splice(di, 1);
  if (q && q.multi) {
    // スパイス申告の取り消し: 未申告に戻し、スパイス系チェーンを封印し直す
    S.spices = null;
    SPICE_CHAINS.forEach(cid => {
      // 自動スキップぶんを取り消す。実際に完了したステップ（ログに残る）までは維持
      let step = 0;
      S.log.forEach(en => {
        const st = CHAIN_STEPS[en.id];
        if (st && st.chainId === cid) step = Math.max(step, st.stepIndex + 1);
      });
      S.chains[cid] = step;
      S.order = S.order.filter(x => {
        const st = CHAIN_STEPS[x];
        return !(st && st.chainId === cid);
      });
    });
    // 申告カードをデッキに戻す
    if (!S.order.includes(q.id)) {
      S.order.splice(Math.floor(Math.random() * (S.order.length + 1)), 0, q.id);
    }
    // 場に出ているカードが封印対象なら引き直す
    const cur = CHAIN_STEPS[S.slot];
    if (cur && SPICE_CHAINS.includes(cur.chainId)) { S.slot = draw(S); renderCard(); }
  }
  if (q && q.chainId) {
    // 最新ステップの取り消しならチェーンを1歩巻き戻す
    if ((S.chains[q.chainId] || 0) === q.stepIndex + 1) {
      S.chains[q.chainId] = q.stepIndex;
      const nextId = `${q.chainId}-${q.stepIndex + 1}`;
      S.order = S.order.filter(x => x !== nextId);
      // 申告前に封印されているチェーンのカードは、デッキには戻さない（進行位置だけ巻き戻す）
      const sealed = !S.spices && SPICE_CHAINS.includes(q.chainId);
      if (!sealed && !S.order.includes(entry.id)) {
        S.order.splice(Math.floor(Math.random() * (S.order.length + 1)), 0, entry.id);
      }
      // 巻き戻しで消したステップが場に出ていたら引き直す
      if (S.slot === nextId) { S.slot = draw(S); renderCard(); }
    }
  }
  save();
  renderAlbum();
  updateBadge();
}
document.querySelector('#albumlist').addEventListener('click', e => {
  const btn = e.target.closest('.btn-undo');
  if (btn) { undoEntry(Number(btn.dataset.index)); return; }
  if (e.target.tagName === 'IMG') {
    // 写真タップで拡大表示
    $('#lightbox img').src = e.target.src;
    $('#lightbox').hidden = false;
  }
});
$('#lightbox').addEventListener('click', () => { $('#lightbox').hidden = true; });

// はじめから（デバッグ用の全リセット）: 記録・申告・チェーン進行をすべて消してやり直す
$('#resetall').addEventListener('click', () => {
  if (!confirm('すべての記録を消して、はじめからにしますか？')) return;
  localStorage.removeItem(KEY);
  location.reload();
});

// ---- タブ ----
function showTab(name) {
  $('#view-today').hidden = name !== 'today';
  $('#view-album').hidden = name !== 'album';
  $('#tab-today').classList.toggle('active', name === 'today');
  $('#tab-album').classList.toggle('active', name === 'album');
  if (name === 'album') renderAlbum();
}
$('#tab-today').addEventListener('click', () => showTab('today'));
$('#tab-album').addEventListener('click', () => showTab('album'));
function updateBadge() {
  $('#albumcount').textContent = S.log.length ? `（${S.log.length}）` : '';
}

// ---- 起動 ----
save();
renderCard();
updateBadge();

// PWA: オフライン用サービスワーカー（file:// で開いたときは登録しない）
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('./sw.js');
}
</script>
